<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: #333;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 14px; font-weight: 700; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label { font-weight: 600; }
    .toggle-sub { font-size: 11px; color: #999; }
    /* Toggle switch */
    .switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: #ccc; border-radius: 22px; transition: 0.2s;
    }
    .slider::before {
      content: ''; position: absolute;
      height: 16px; width: 16px; left: 3px; bottom: 3px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .slider { background: #2BBC7F; }
    input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-128.png" alt="">
    <h1>DailyTrial MD Preview</h1>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">有効化</div>
      <div class="toggle-sub">Markdown プレビューを有効化</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="enabled" checked>
      <span class="slider"></span>
    </label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
